<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorslife</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main>
        <header class="encabezado-cuadro">
          <h1>Generador De Paleta</h1>
          <p>Elegi los colores que mas sea de tu agrado para tus proyectos</p>
        </header>  

        <section class="controles">
            <div class="fila-botones">
                <button class="btn-palette">🎨 Generar Paleta</button>
                <button class="btn-guardar">💾 Guardar Paleta</button>
            </div>

            <div class="form-guardar oculto">
                <input type="text" class="input-nombre-paleta" placeholder="Nombre de la paleta">
                <button class="btn-confirmar-guardar">✔️ Confirmar</button>
            </div>

            <div class="control-grupo">
                <h3>Cantidad de colores:</h3>
                <div class="btn-elegir">
                    <button data-cantidad="6">6</button>
                    <button data-cantidad="8">8</button>
                    <button data-cantidad="9">9</button>
                </div>
            </div>

            <div class="control-grupo">
                <h3>Formato:</h3>
                <div class="btn-formato-group">
                    <button class="btn-formato activo" data-formato="hex">HEX</button>
                    <button class="btn-formato" data-formato="hsl">HSL</button>
                </div>
            </div>
        </section>

        <section class="palette-container"></section>

        <section class="guardadas-container">
            <h3>Paletas Guardadas</h3>
            <div class="lista-guardadas"></div>
        </section>
    </main>

    <footer> 
      <p>&copy; 2026 ColorsLife. Todos los derechos reservados</p> 
      <div class="redes-sociales">
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
      </div>
    </footer>


    <script src="script.js"></script>
</body>
</html>
